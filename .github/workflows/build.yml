name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 2.7
        run: |
          cat > "$RUNNER_TEMP/python27" <<'SH'
          #!/usr/bin/env bash
          exec docker run --rm -v "$PWD":"$PWD" -w "$PWD" -u "$(id -u):$(id -g)" python:2.7-slim python "$@"
          SH
          chmod +x "$RUNNER_TEMP/python27"
          echo "PYTHON27=$RUNNER_TEMP/python27" >> "$GITHUB_ENV"

      - name: Build .wotmod
        run: python build.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wotmod
          path: dist/*.wotmod
          if-no-files-found: error
          retention-days: 1
