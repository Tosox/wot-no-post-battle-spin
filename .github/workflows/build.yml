name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build .wotmod
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -u "$(id -u):$(id -g)" \
            python:2.7-slim \
            python build.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wotmod
          path: dist/*.wotmod
          if-no-files-found: error
          retention-days: 1
