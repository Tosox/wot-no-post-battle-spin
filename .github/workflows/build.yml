name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 2.7
        uses: actions/setup-python@v5
        with:
          python-version: '2.7'

      - name: Build .wotmod
        run: python build.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wotmod
          path: dist/*.wotmod
          if-no-files-found: error
          retention-days: 1
